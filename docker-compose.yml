services:
  postgres:
    image: postgres:16-alpine
    container_name: clarin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clarin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-clarin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clarin}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - clarin-internal

  redis:
    image: redis:7-alpine
    container_name: clarin-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - clarin-internal

  minio:
    image: minio/minio:latest
    container_name: clarin-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-clarinadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - clarin-internal
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.clarin-minio.rule=Host(`media.clarin.naperu.cloud`)"
      - "traefik.http.routers.clarin-minio.entrypoints=websecure"
      - "traefik.http.routers.clarin-minio.tls=true"
      - "traefik.http.routers.clarin-minio.tls.certresolver=letsencrypt"
      - "traefik.http.routers.clarin-minio.service=clarin-minio"
      - "traefik.http.services.clarin-minio.loadbalancer.server.port=9000"
      - "traefik.http.routers.clarin-minio-console.rule=Host(`minio.clarin.naperu.cloud`)"
      - "traefik.http.routers.clarin-minio-console.entrypoints=websecure"
      - "traefik.http.routers.clarin-minio-console.tls=true"
      - "traefik.http.routers.clarin-minio-console.tls.certresolver=letsencrypt"
      - "traefik.http.routers.clarin-minio-console.service=clarin-minio-console"
      - "traefik.http.services.clarin-minio-console.loadbalancer.server.port=9001"

  backend:
    build:
      context: ./backend
      dockerfile: ../deploy/Dockerfile.backend
    container_name: clarin-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-clarin}:${POSTGRES_PASSWORD}@clarin-postgres:5432/${POSTGRES_DB:-clarin}?sslmode=disable
      REDIS_URL: redis://clarin-redis:6379
      JWT_SECRET: ${JWT_SECRET}
      PORT: 8080
      ENV: production
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@clarin.naperu.cloud}
      CORS_ORIGINS: https://clarin.naperu.cloud,https://www.clarin.naperu.cloud,http://localhost:3000,http://localhost:8080
      MINIO_ENDPOINT: clarin-minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-clarinadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: clarin-media
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_URL: https://media.clarin.naperu.cloud
      # Kommo CRM
      KOMMO_SUBDOMAIN: ${KOMMO_SUBDOMAIN:-}
      KOMMO_CLIENT_ID: ${KOMMO_CLIENT_ID:-}
      KOMMO_CLIENT_SECRET: ${KOMMO_CLIENT_SECRET:-}
      KOMMO_ACCESS_TOKEN: ${KOMMO_ACCESS_TOKEN:-}
      KOMMO_REDIRECT_URI: ${KOMMO_REDIRECT_URI:-}
      KOMMO_PROXY_URL: ${KOMMO_PROXY_URL:-}
      # Kommo Webhooks
      KOMMO_WEBHOOK_SECRET: ${KOMMO_WEBHOOK_SECRET:-}
      PUBLIC_URL: "https://clarin.naperu.cloud"
      # AI Assistant (Eros)
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      # Google Contacts sync
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      # Cloudflare Turnstile (login protection)
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      # SOCKS5 proxy for WhatsApp CDN media uploads (Cloudflare WARP)
      MEDIA_SOCKS5_PROXY: socks5://host-gateway:40001
    extra_hosts:
      - "host-gateway:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - whatsapp_sessions:/app/sessions
    mem_limit: 1536m
    cpus: 1.5
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ports:
      - "8080:8080"
      - "8081:8081"
    networks:
      - clarin-internal
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.clarin-api.rule=Host(`clarin.naperu.cloud`) && (PathPrefix(`/api`) || PathPrefix(`/ws`) || PathPrefix(`/health`))"
      - "traefik.http.routers.clarin-api.entrypoints=websecure"
      - "traefik.http.routers.clarin-api.tls=true"
      - "traefik.http.routers.clarin-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.clarin-api.loadbalancer.server.port=8080"
      - "traefik.http.routers.clarin-api.service=clarin-api"
      - "traefik.http.routers.clarin-api.priority=100"
      # MCP Server (Model Context Protocol) — SSE transport on port 8081
      - "traefik.http.routers.clarin-mcp.rule=Host(`clarin.naperu.cloud`) && PathPrefix(`/mcp`)"
      - "traefik.http.routers.clarin-mcp.entrypoints=websecure"
      - "traefik.http.routers.clarin-mcp.tls=true"
      - "traefik.http.routers.clarin-mcp.tls.certresolver=letsencrypt"
      - "traefik.http.services.clarin-mcp.loadbalancer.server.port=8081"
      - "traefik.http.routers.clarin-mcp.service=clarin-mcp"
      - "traefik.http.routers.clarin-mcp.priority=110"

  frontend:
    build:
      context: ./frontend
      dockerfile: ../deploy/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: https://clarin.naperu.cloud
        NEXT_PUBLIC_WS_URL: wss://clarin.naperu.cloud
        NEXT_PUBLIC_APP_URL: https://clarin.naperu.cloud
        NEXT_PUBLIC_MARKETING_URL: https://landing.clarin.naperu.cloud
    container_name: clarin-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://clarin.naperu.cloud
      NEXT_PUBLIC_WS_URL: wss://clarin.naperu.cloud
      NEXT_PUBLIC_APP_URL: https://clarin.naperu.cloud
      NEXT_PUBLIC_MARKETING_URL: https://landing.clarin.naperu.cloud
    depends_on:
      - backend
    ports:
      - "3001:3000"
    networks:
      - clarin-internal
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.middlewares.clarin-frontend-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.clarin-frontend-https.redirectscheme.permanent=true"
      - "traefik.http.routers.clarin-frontend-app.rule=Host(`clarin.naperu.cloud`)"
      - "traefik.http.routers.clarin-frontend-app.entrypoints=websecure"
      - "traefik.http.routers.clarin-frontend-app.tls=true"
      - "traefik.http.routers.clarin-frontend-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.clarin-frontend-app.service=clarin-frontend"
      - "traefik.http.routers.clarin-frontend-app.priority=1"
      - "traefik.http.routers.clarin-frontend-landing.rule=Host(`landing.clarin.naperu.cloud`)"
      - "traefik.http.routers.clarin-frontend-landing.entrypoints=websecure"
      - "traefik.http.routers.clarin-frontend-landing.tls=true"
      - "traefik.http.routers.clarin-frontend-landing.tls.certresolver=letsencrypt"
      - "traefik.http.routers.clarin-frontend-landing.service=clarin-frontend"
      - "traefik.http.routers.clarin-frontend-landing.priority=1"
      - "traefik.http.routers.clarin-frontend-app-http.rule=Host(`clarin.naperu.cloud`)"
      - "traefik.http.routers.clarin-frontend-app-http.entrypoints=web"
      - "traefik.http.routers.clarin-frontend-app-http.middlewares=clarin-frontend-https"
      - "traefik.http.routers.clarin-frontend-app-http.service=clarin-frontend"
      - "traefik.http.routers.clarin-frontend-landing-http.rule=Host(`landing.clarin.naperu.cloud`)"
      - "traefik.http.routers.clarin-frontend-landing-http.entrypoints=web"
      - "traefik.http.routers.clarin-frontend-landing-http.middlewares=clarin-frontend-https"
      - "traefik.http.routers.clarin-frontend-landing-http.service=clarin-frontend"
      - "traefik.http.services.clarin-frontend.loadbalancer.server.port=3000"

volumes:
  postgres_data:
  redis_data:
  whatsapp_sessions:
  minio_data:
networks:
  clarin-internal:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: "172.29.0.0/16"
        - subnet: "fd00:cafe:babe::/48"
  dokploy-network:
    external: true
